name: DHHF DCA Bot

on:
  schedule:
    # Runs every 2 hours on weekdays.
    # Covers both AEST (UTC+10) and AEDT (UTC+11) without DST logic —
    # the bot handles timezone filtering internally.
    # ASX check hours: 10am, 12pm, 2pm, 4pm Melbourne time.
    # AEDT window (Oct–Apr): 23:00, 01:00, 03:00, 05:00 UTC
    # AEST window (Apr–Oct): 00:00, 02:00, 04:00, 06:00 UTC
    # Running every 2h Mon–Fri from 22:00–07:00 UTC covers both.
    - cron: '0 22,0,2,4,6 * * 1-5'
    - cron: '0 23,1,3,5 * * 1-5'

  # Allow manual trigger from GitHub Actions tab (useful for testing)
  workflow_dispatch:

permissions:
  contents: write   # needed to commit bot_state.json back to repo

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use default GITHUB_TOKEN — permissions: contents: write above
          # lets this push back to the repo.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ───────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run bot ────────────────────────────────────────────────────────
      - name: Run DHHF bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # Store these as GitHub Actions Variables (not secrets) so you can
          # edit them without touching code. Repo → Settings → Variables → Actions
          AVERAGE_COST:    ${{ vars.AVERAGE_COST }}
          MONTHLY_AMOUNT:  ${{ vars.MONTHLY_AMOUNT }}
          BONUS_AMOUNT:    ${{ vars.BONUS_AMOUNT }}
          MONTHLY_BUDGET:  ${{ vars.MONTHLY_BUDGET }}
          MIN_ORDER:       ${{ vars.MIN_ORDER }}
        run: python dhhf_bot.py

      # ── 5. Commit state back to repo ─────────────────────────────────────
      # Only commits if bot_state.json actually changed (a buy happened).
      # [skip ci] prevents this commit from re-triggering the workflow.
      - name: Commit state file
        run: |
          git config user.name  "DHHF Bot"
          git config user.email "dhhf-bot@users.noreply.github.com"
          git add bot_state.json
          git diff --staged --quiet \
            || git commit -m "chore: update bot state [skip ci]" \
            && git push
